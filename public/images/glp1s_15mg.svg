<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <radialGradient id="bgglp1s_15mg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#172554" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glowglp1s_15mg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgglp1s_15mg)"/>
  <rect width="600" height="600" fill="url(#glowglp1s_15mg)"/>

  <!-- Vial body -->
  <g filter="url(#shadow)">
    <!-- Vial glass -->
    <rect x="240" y="120" width="120" height="200" rx="14" ry="14" fill="#1a1a1a" stroke="#3b82f6" stroke-width="2" opacity="0.95"/>
    <!-- Cap -->
    <rect x="252" y="108" width="96" height="28" rx="8" ry="8" fill="#3b82f6" opacity="0.9"/>
    <!-- Liquid fill -->
    <rect x="244" y="200" width="112" height="116" rx="0" ry="0" fill="#3b82f6" opacity="0.15"/>
    <rect x="244" y="200" width="112" height="2" fill="#3b82f6" opacity="0.4"/>
    <!-- Vial shine -->
    <rect x="250" y="125" width="14" height="160" rx="7" fill="white" opacity="0.06"/>
    <!-- Label band -->
    <rect x="240" y="170" width="120" height="80" fill="white" opacity="0.04"/>
    <rect x="240" y="170" width="120" height="1" fill="#3b82f6" opacity="0.3"/>
    <rect x="240" y="249" width="120" height="1" fill="#3b82f6" opacity="0.3"/>
    <!-- Dose text on vial -->
    <text x="300" y="216" font-family="monospace" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle" opacity="0.9">15mg</text>
  </g>

  <!-- Product name -->
  <text x="300" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="800" fill="white" text-anchor="middle" opacity="0.95">Semaglutide</text>
  

  <!-- Category badge -->
  <rect x="175" y="320" width="250" height="36" rx="18" fill="#3b82f6" opacity="0.12"/>
  <rect x="175" y="320" width="250" height="36" rx="18" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <text x="300" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle" opacity="0.85">⚡ Fat Loss</text>

  <!-- Bottom: Apollo label -->
  <text x="300" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">Apollo Peptide Sciences</text>

  <!-- Corner accent dots -->
  <circle cx="40" cy="40" r="3" fill="#3b82f6" opacity="0.3"/>
  <circle cx="560" cy="40" r="3" fill="#3b82f6" opacity="0.3"/>
  <circle cx="40" cy="560" r="3" fill="#3b82f6" opacity="0.3"/>
  <circle cx="560" cy="560" r="3" fill="#3b82f6" opacity="0.3"/>
</svg>